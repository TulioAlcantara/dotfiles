after-login-command = []
after-startup-command = []
start-at-login = true
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true
accordion-padding = 20
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']
automatically-unhide-macos-hidden-apps = true

[key-mapping]
preset = 'qwerty'

[gaps]
inner.horizontal = 0
inner.vertical = 0
outer.left = 0
outer.bottom = 0
outer.top = 0
outer.right = 0

[workspace-to-monitor-force-assignment]
1 = 'main'
2 = 'main'
3 = 'main'
4 = 'main'
5 = 'main'
6 = 'main'
7 = 'main'
8 = 'main'
9 = 'main'
10 = 'main'
11 = 'secondary'
12 = 'secondary'
13 = 'secondary'
14 = 'secondary'
15 = 'secondary'

[mode.main.binding]
alt-period = 'layout accordion horizontal'
alt-comma = 'layout tiles horizontal'
alt-slash = 'fullscreen'
alt-h = 'focus left --boundaries-action wrap-around-the-workspace'
alt-j = 'focus down --boundaries-action wrap-around-the-workspace'
alt-k = 'focus up --boundaries-action wrap-around-the-workspace'
alt-l = 'focus right --boundaries-action wrap-around-the-workspace'
alt-esc = 'focus right --boundaries-action wrap-around-the-workspace'
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'
alt-n = 'resize smart -50'
alt-m = 'resize smart +50'
alt-a = 'workspace 1'
alt-s = 'workspace 2'
alt-d = 'workspace 3'
alt-f = 'workspace 4'
alt-g = 'workspace 5'
alt-q = 'workspace 6'
alt-w = 'workspace 7'
alt-e = 'workspace 8'
alt-r = 'workspace 9'
alt-t = 'workspace 10'
alt-z = 'workspace 11'
alt-x = 'workspace 12'
alt-c = 'workspace 13'
alt-v = 'workspace 14'
alt-b = 'workspace 15'
# alt-6 = 'workspace 16'
# alt-7 = 'workspace 17'
# alt-8 = 'workspace 18'
# alt-9 = 'workspace 19'
alt-shift-a = 'move-node-to-workspace 1'
alt-shift-s = 'move-node-to-workspace 2'
alt-shift-d = 'move-node-to-workspace 3'
alt-shift-f = 'move-node-to-workspace 4'
alt-shift-g = 'move-node-to-workspace 5'
alt-shift-q = 'move-node-to-workspace 6'
alt-shift-w = 'move-node-to-workspace 7'
alt-shift-e = 'move-node-to-workspace 8'
alt-shift-r = 'move-node-to-workspace 9'
alt-shift-t = 'move-node-to-workspace 10'
alt-shift-z = 'move-node-to-workspace 11'
alt-shift-x = 'move-node-to-workspace 12'
alt-shift-c = 'move-node-to-workspace 13'
alt-shift-v = 'move-node-to-workspace 14'
alt-shift-b = 'move-node-to-workspace 15'
cmd-shift-semicolon = 'mode service'

[mode.service.binding]
esc = ['reload-config', 'mode main']
r = ['flatten-workspace-tree', 'mode main'] # reset layout
f = [
    'layout floating tiling',
    'mode main',
] # Toggle between floating and tiling layout
backspace = ['close-all-windows-but-current', 'mode main']
cmd-shift-h = ['join-with left', 'mode main']
cmd-shift-j = ['join-with down', 'mode main']
cmd-shift-k = ['join-with up', 'mode main']
cmd-shift-l = ['join-with right', 'mode main']
down = 'volume down'
up = 'volume up'
shift-down = ['volume set 0', 'mode main']
